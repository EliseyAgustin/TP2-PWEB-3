<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — StockApp</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ── Background orbs ── */
    .login-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    #bg-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      will-change: transform, opacity;
      opacity: 0;
    }
    .bg-orb-1 {
      width: 820px; height: 820px;
      background: radial-gradient(circle at 40% 40%, rgba(99,102,241,0.45) 0%, transparent 65%);
      filter: blur(90px);
      top: -380px; left: -220px;
    }
    .bg-orb-2 {
      width: 700px; height: 700px;
      background: radial-gradient(circle at 60% 60%, rgba(167,139,250,0.4) 0%, transparent 65%);
      filter: blur(100px);
      bottom: -320px; right: -180px;
    }
    .bg-orb-3 {
      width: 480px; height: 480px;
      background: radial-gradient(circle at 50% 50%, rgba(34,211,238,0.22) 0%, transparent 65%);
      filter: blur(80px);
      bottom: -80px; left: -60px;
    }
    .bg-orb-4 {
      width: 360px; height: 360px;
      background: radial-gradient(circle at 50% 50%, rgba(244,114,182,0.18) 0%, transparent 65%);
      filter: blur(70px);
      top: 15%; right: 8%;
    }

    /* ── Login page above background ── */
    .login-page {
      position: relative;
      z-index: 1;
    }
    /* Remove default pseudo-element glow from style.css */
    .login-page::before { display: none; }

    /* ── Login card ── */
    .login-logo-icon {
      font-size: 2rem;
      color: var(--accent);
      display: inline-block;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin-bottom: var(--sp-6);
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-default);
    }
    .login-divider span {
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field-icon-wrap { position: relative; }
    .field-icon-wrap .form-control { padding-left: 2.5rem; }
    .field-icon-wrap .field-icon {
      position: absolute;
      left: var(--sp-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
      transition: color var(--t-base);
    }
    .field-icon-wrap .form-control:focus ~ .field-icon { color: var(--accent); }

    #login-btn i { transition: transform 0.3s var(--ease-out); }
    #login-btn:hover i { transform: translateX(4px); }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="login-bg" aria-hidden="true">
    <canvas id="bg-canvas"></canvas>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-orb bg-orb-4"></div>
  </div>

  <div class="login-page">
    <main id="main-content" class="login-card" role="main">

      <!-- Logo -->
      <div class="login-logo-wrap" id="anim-logo">
        <span class="login-logo-icon"><i class="fa-solid fa-warehouse" aria-hidden="true"></i></span>
        <span class="login-logo">StockApp</span>
      </div>
      <p class="login-subtitle" id="anim-subtitle">Sistema de gestión de stock</p>

      <div class="login-divider" id="anim-divider">
        <span>Acceso seguro</span>
      </div>

      <div id="login-alert" class="alert alert-error" role="alert" aria-live="assertive"></div>

      <form id="login-form" novalidate>
        <div class="form-group" id="anim-field-1">
          <label for="username">
            <i class="fa-solid fa-user" aria-hidden="true" style="margin-right:4px;font-size:.8rem;"></i>
            Usuario
          </label>
          <input type="text" id="username" class="form-control"
            placeholder="Tu nombre de usuario"
            autocomplete="username"
            required aria-required="true"
            aria-describedby="username-error">
          <div id="username-error" class="text-danger mt-1" role="alert" style="display:none;"></div>
        </div>

        <div class="form-group" id="anim-field-2">
          <label for="password">
            <i class="fa-solid fa-lock" aria-hidden="true" style="margin-right:4px;font-size:.8rem;"></i>
            Contraseña
          </label>
          <input type="password" id="password" class="form-control"
            placeholder="Tu contraseña"
            autocomplete="current-password"
            required aria-required="true"
            aria-describedby="password-error">
          <div id="password-error" class="text-danger mt-1" role="alert" style="display:none;"></div>
        </div>

        <div id="anim-btn">
          <button type="submit" id="login-btn" class="btn btn-primary btn-lg btn-full"
            style="margin-top:var(--sp-2);gap:var(--sp-3);">
            Iniciar sesión
            <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
          </button>
        </div>
      </form>

    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {

    /* ═══════════════════════════════════════════
       CANVAS CONSTELLATION
    ═══════════════════════════════════════════ */
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const PALETTE = [
      [129, 140, 248],   // indigo-400
      [99,  102, 241],   // indigo-500
      [167, 139, 250],   // violet-400
      [139,  92, 246],   // violet-500
      [96,  165, 250],   // blue-400
      [34,  211, 238],   // cyan-400
    ];

    const NUM_P = 68;
    const MAX_D = 125;

    const pts = Array.from({ length: NUM_P }, () => {
      const c = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      return {
        x:  Math.random() * window.innerWidth,
        y:  Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.38,
        vy: (Math.random() - 0.5) * 0.38,
        r:  Math.random() * 1.6 + 0.7,
        c,
        a:  0,
        ta: Math.random() * 0.55 + 0.2,
      };
    });

    let fade = 0; // canvas global fade-in

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (fade < 1) fade = Math.min(1, fade + 0.0028); // ~6s to reach full opacity

      // Draw connections
      for (let i = 0; i < NUM_P; i++) {
        for (let j = i + 1; j < NUM_P; j++) {
          const dx = pts[i].x - pts[j].x;
          const dy = pts[i].y - pts[j].y;
          const d  = Math.hypot(dx, dy);
          if (d < MAX_D) {
            const str = (1 - d / MAX_D) * 0.16 * fade;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(129,140,248,${str})`;
            ctx.lineWidth   = 0.7;
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }

      // Draw dots
      pts.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width)  p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        p.a  = Math.min(p.ta, p.a + 0.003);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.a * fade})`;
        ctx.fill();
      });

      requestAnimationFrame(tick);
    }
    tick();


    /* ═══════════════════════════════════════════
       ORB INTRO — 5 SECOND ORCHESTRATED REVEAL
    ═══════════════════════════════════════════ */

    // Orb 1 — indigo, top-left (0ms)
    anime({
      targets: '.bg-orb-1',
      opacity:    [0, 0.9],
      translateX: [-140, 0],
      translateY: [-140, 0],
      scale:      [0.35, 1],
      duration:   3400,
      easing:     'easeOutQuart',
      complete() {
        anime({
          targets:  '.bg-orb-1',
          translateY: [0, -50, 25, 0],
          translateX: [0, 25, -15, 0],
          duration:   11000,
          loop:       true,
          easing:     'easeInOutSine',
        });
      }
    });

    // Orb 2 — violet, bottom-right (350ms)
    anime({
      targets: '.bg-orb-2',
      opacity:    [0, 0.85],
      translateX: [150, 0],
      translateY: [150, 0],
      scale:      [0.4, 1],
      duration:   3800,
      delay:      350,
      easing:     'easeOutQuart',
      complete() {
        anime({
          targets:  '.bg-orb-2',
          translateY: [0, 40, -50, 0],
          translateX: [0, -35, 20, 0],
          duration:   14000,
          loop:       true,
          easing:     'easeInOutSine',
        });
      }
    });

    // Orb 3 — cyan, bottom-left (700ms)
    anime({
      targets: '.bg-orb-3',
      opacity:    [0, 0.8],
      translateX: [-100, 0],
      translateY: [100, 0],
      scale:      [0.45, 1],
      duration:   3200,
      delay:      700,
      easing:     'easeOutQuart',
      complete() {
        anime({
          targets:  '.bg-orb-3',
          translateX: [0, 60, -30, 0],
          translateY: [0, -45, 30, 0],
          duration:   17000,
          loop:       true,
          easing:     'easeInOutSine',
        });
      }
    });

    // Orb 4 — pink, top-right (1000ms)
    anime({
      targets: '.bg-orb-4',
      opacity:    [0, 0.75],
      translateX: [80, 0],
      translateY: [-80, 0],
      scale:      [0.3, 1],
      duration:   2800,
      delay:      1000,
      easing:     'easeOutQuart',
      complete() {
        anime({
          targets:  '.bg-orb-4',
          translateX: [0, -40, 55, 0],
          translateY: [0, 55, -30, 0],
          duration:   19000,
          loop:       true,
          easing:     'easeInOutSine',
        });
      }
    });


    /* ═══════════════════════════════════════════
       CARD TIMELINE
    ═══════════════════════════════════════════ */
    anime.set('.login-card',    { opacity: 0, translateY: 40, scale: 0.97 });
    anime.set('#anim-logo',     { opacity: 0, translateY: -22 });
    anime.set('#anim-subtitle', { opacity: 0 });
    anime.set('#anim-divider',  { opacity: 0, scaleX: 0.4 });
    anime.set('#anim-field-1',  { opacity: 0, translateX: -20 });
    anime.set('#anim-field-2',  { opacity: 0, translateX: -20 });
    anime.set('#anim-btn',      { opacity: 0, translateY: 16 });

    const tl = anime.timeline({ easing: 'easeOutExpo' });

    tl.add({
      targets:     '.login-card',
      opacity:     [0, 1],
      translateY:  [40, 0],
      scale:       [0.97, 1],
      duration:    750,
    })
    .add({
      targets:    '#anim-logo',
      opacity:    [0, 1],
      translateY: [-22, 0],
      duration:   520,
    }, '-=500')
    .add({
      targets:  '.login-logo-icon',
      rotate:   [-10, 0],
      duration: 650,
      easing:   'easeOutElastic(1, .65)',
    }, '-=500')
    .add({
      targets:  '#anim-subtitle',
      opacity:  [0, 1],
      duration: 400,
    }, '-=280')
    .add({
      targets:  '#anim-divider',
      opacity:  [0, 1],
      scaleX:   [0.4, 1],
      duration: 440,
      easing:   'easeOutCubic',
    }, '-=200')
    .add({
      targets:    '#anim-field-1',
      opacity:    [0, 1],
      translateX: [-20, 0],
      duration:   380,
    }, '-=230')
    .add({
      targets:    '#anim-field-2',
      opacity:    [0, 1],
      translateX: [-20, 0],
      duration:   380,
    }, '-=290')
    .add({
      targets:    '#anim-btn',
      opacity:    [0, 1],
      translateY: [16, 0],
      duration:   360,
      easing:     'easeOutBack',
    }, '-=210');

    // Subtle logo icon pulse (after card fully loads)
    anime({
      targets:  '.login-logo-icon',
      scale:    [1, 1.09, 1],
      duration: 2600,
      loop:     true,
      easing:   'easeInOutSine',
      delay:    2000,
    });

  });
  </script>
</body>
</html>
