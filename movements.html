<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimientos — StockApp</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="layout">
    <aside id="sidebar" class="sidebar" aria-label="Menú de navegación"></aside>

    <main id="main-content" class="main-content">

      <div class="page-header">
        <h1>Movimientos de stock</h1>
      </div>

      <div class="section-card" aria-label="Registrar movimiento">
        <div class="section-title">
          <i class="fa-solid fa-plus" aria-hidden="true" style="color:var(--text-muted)"></i>
          Registrar movimiento
        </div>

        <div id="form-alert" class="alert alert-error" role="alert" aria-live="assertive"></div>

        <form id="movement-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="m-product">Producto <span class="req" aria-label="requerido">*</span></label>
              <select id="m-product" class="form-control" required aria-required="true">
                <option value="">Seleccionar producto...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="m-type">Tipo <span class="req" aria-label="requerido">*</span></label>
              <select id="m-type" class="form-control" required aria-required="true">
                <option value="">Seleccionar tipo...</option>
                <option value="entrada">Entrada</option>
                <option value="salida">Salida</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="m-quantity">Cantidad <span class="req" aria-label="requerido">*</span></label>
              <input type="number" id="m-quantity" class="form-control" min="1" step="1"
                placeholder="1" required aria-required="true">
            </div>
            <div class="form-group">
              <label for="m-description">Descripción</label>
              <input type="text" id="m-description" class="form-control" maxlength="200" placeholder="Opcional">
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="movement-submit">
            <i class="fa-solid fa-check" aria-hidden="true"></i>
            Registrar
          </button>
        </form>
      </div>

      <div class="section-title" style="margin-bottom:var(--sp-3)">
        <i class="fa-solid fa-clock-rotate-left" aria-hidden="true" style="color:var(--text-muted)"></i>
        Historial
      </div>
      <div class="table-wrapper table--movements">
        <table aria-label="Historial de movimientos de stock">
          <thead>
            <tr>
              <th scope="col">Producto</th>
              <th scope="col">Tipo</th>
              <th scope="col">Cantidad</th>
              <th scope="col">Descripción</th>
              <th scope="col">Usuario</th>
              <th scope="col">Fecha</th>
            </tr>
          </thead>
          <tbody id="movements-tbody">
            <tr><td colspan="6" class="loading">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/movements.js"></script>
</body>
</html>
