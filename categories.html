<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías — StockApp</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="layout">
    <aside id="sidebar" class="sidebar" aria-label="Menú de navegación"></aside>

    <main id="main-content" class="main-content">

      <div class="page-header">
        <h1>Categorías</h1>
      </div>

      <div id="page-alert" class="alert alert-error" role="alert" aria-live="assertive"></div>

      <div id="create-form-section" class="section-card hidden" aria-label="Formulario nueva categoría">
        <div class="section-title">
          <i class="fa-solid fa-plus" aria-hidden="true" style="color:var(--text-muted)"></i>
          Nueva categoría
        </div>
        <form id="category-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="c-name">Nombre <span class="req" aria-label="requerido">*</span></label>
              <input type="text" id="c-name" class="form-control" maxlength="50"
                placeholder="Ej: Limpieza" required aria-required="true">
            </div>
            <div class="form-group">
              <label for="c-description">Descripción</label>
              <input type="text" id="c-description" class="form-control" placeholder="Opcional">
            </div>
          </div>
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-plus" aria-hidden="true"></i>
            Crear categoría
          </button>
        </form>
      </div>

      <div class="table-wrapper">
        <table aria-label="Lista de categorías">
          <thead>
            <tr>
              <th scope="col">Nombre</th>
              <th scope="col">Descripción</th>
              <th scope="col">Creada</th>
              <th scope="col" id="actions-header" class="hidden">Acciones</th>
            </tr>
          </thead>
          <tbody id="categories-tbody">
            <tr><td colspan="4" class="loading">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/categories.js"></script>
</body>
</html>
