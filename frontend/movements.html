<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimientos — Stock Almacén</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">

      <div class="page-header">
        <h1>Movimientos de stock</h1>
      </div>

      <!-- Formulario (admin y user) -->
      <div class="section-card">
        <div class="section-title">Registrar movimiento</div>

        <div id="form-alert" class="alert alert-error"></div>

        <form id="movement-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="m-product">Producto *</label>
              <select id="m-product" class="form-control">
                <option value="">Seleccionar producto...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="m-type">Tipo *</label>
              <select id="m-type" class="form-control">
                <option value="">Seleccionar...</option>
                <option value="entrada">Entrada</option>
                <option value="salida">Salida</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="m-quantity">Cantidad *</label>
              <input type="number" id="m-quantity" class="form-control" min="1" step="1" placeholder="1">
            </div>
            <div class="form-group">
              <label for="m-description">Descripción</label>
              <input type="text" id="m-description" class="form-control" maxlength="200" placeholder="Opcional">
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="movement-submit">Registrar</button>
        </form>
      </div>

      <!-- Historial -->
      <div class="section-title">Historial</div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Producto</th>
              <th>Tipo</th>
              <th>Cantidad</th>
              <th>Descripción</th>
              <th>Usuario</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="movements-tbody">
            <tr><td colspan="6" class="loading">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/movements.js"></script>
</body>
</html>
