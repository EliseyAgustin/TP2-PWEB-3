<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Stock Almacén</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">StockApp</div>
      <p class="login-subtitle">Sistema de gestión de stock</p>

      <div id="login-alert" class="alert alert-error"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" class="form-control"
            placeholder="Tu usuario" autocomplete="username">
          <div id="username-error" class="text-danger mt-1" style="display:none;"></div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control"
            placeholder="Tu contraseña" autocomplete="current-password">
          <div id="password-error" class="text-danger mt-1" style="display:none;"></div>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary"
          style="width:100%;justify-content:center;margin-top:0.5rem;">
          Iniciar sesión
        </button>
      </form>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/login.js"></script>
</body>
</html>
