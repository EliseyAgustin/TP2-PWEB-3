<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — Stock Almacén</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">

      <div class="page-header">
        <h1>Productos</h1>
        <button id="btn-create" class="btn btn-primary hidden">+ Nuevo producto</button>
      </div>

      <div id="page-alert" class="alert alert-error"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Mín.</th>
              <th>Estado</th>
              <th id="actions-header" class="hidden">Acciones</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="7" class="loading">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal crear/editar -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Nuevo producto</span>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>

      <div id="modal-alert" class="alert alert-error"></div>

      <form id="product-form" novalidate>
        <input type="hidden" id="product-id">

        <div class="form-group">
          <label for="p-name">Nombre *</label>
          <input type="text" id="p-name" class="form-control" maxlength="100" placeholder="Ej: Detergente 1L">
        </div>

        <div class="form-group">
          <label for="p-description">Descripción</label>
          <input type="text" id="p-description" class="form-control" placeholder="Opcional">
        </div>

        <div class="form-group">
          <label for="p-category">Categoría</label>
          <select id="p-category" class="form-control">
            <option value="">Sin categoría</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="p-price">Precio *</label>
            <input type="number" id="p-price" class="form-control" min="0" step="0.01" placeholder="0.00">
          </div>
          <div class="form-group">
            <label for="p-quantity">Cantidad *</label>
            <input type="number" id="p-quantity" class="form-control" min="0" step="1" placeholder="0">
          </div>
        </div>

        <div class="form-group">
          <label for="p-min-stock">Stock mínimo</label>
          <input type="number" id="p-min-stock" class="form-control" min="0" step="1" placeholder="10">
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="modal-submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/products.js"></script>
</body>
</html>
